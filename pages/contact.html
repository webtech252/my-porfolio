<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/contact.css">

    <title>Contact Me</title>
</head>
<body>
    <header class="site-header">
        <div class="navbar">
            <a href="index.html" class="brand">Karan</a>
            <button class="nav-toggle" aria-label="Toggle menu"><i class="fas fa-bars"></i></button>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="services.html">Services</a></li>
                <li><a href="cv.html">CV</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </div>
    </header>
    <div class="container">
        <div class="contact-header">
            <h1>
                <i class="fas fa-envelope left-icon"></i>
                Contact Me
                <i class="fas fa-phone right-icon"></i>
            </h1>
        </div>

        <div class="contact-wrapper">
            <div class="contact-info">
                <h2 class="info-title">Contact Information</h2>
                
                <div class="info-item">
                    <i class="fas fa-envelope"></i>
                    <div class="info-content">
                        <h3>Email</h3>
                        <a href="mailto:codewithkanu@gmail.com">codewithkanu@gmail.com</a>
                    </div>
                </div>

                <div class="info-item">
                    <i class="fas fa-phone"></i>
                    <div class="info-content">
                        <h3>Phone</h3>
                        <a href="tel:+917986613252">+91 7986613252</a>
                    </div>
                </div>

                <div class="info-item">
                    <i class="fas fa-map-marker-alt"></i>
                    <div class="info-content">
                        <h3>Location</h3>
                        <p>Mohali, Punjab, India</p>
                    </div>
                </div>

                <div class="social-media">
                    <h3 class="social-title">Follow Me</h3>
                    <div class="social-icons">
                        <a href="#" class="social-icon"><i class="fab fa-instagram"></i></a>
                        <a href="#" class="social-icon"><i class="fab fa-twitter"></i></a>
                        <a href="#" class="social-icon"><i class="fab fa-facebook"></i></a>
                        <a href="#" class="social-icon"><i class="fab fa-linkedin-in"></i></a>
                    </div>
                </div>
            </div>

            <div class="contact-form">
                <h2 class="form-title">Send Message</h2>
                <form id="contactForm">
                    <div class="form-group">
                        <label for="name">Name</label>
                        <input type="text" id="name" name="name" required>
                    </div>
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" required>
                    </div>
                    <div class="form-group">
                        <label for="message">Message</label>
                        <textarea id="message" name="message" required></textarea>
                    </div>
                    <button type="submit" class="submit-btn">
                        <i class="fas fa-paper-plane"></i>
                        Send Message
                    </button>
                </form>
            </div>
        </div>

        <div class="map-section">
            <div class="map-container">
                <iframe 
                    src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d27446.557256266402!2d76.69033355!3d30.704798749999997!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x390feca1d6b61dc3%3A0x2cf29f39805ce867!2sMohali%2C%20Punjab!5e0!3m2!1sen!2sin!4v1683259142412!5m2!1sen!2sin"
                    allowfullscreen=""
                    loading="lazy"
                    referrerpolicy="no-referrer-when-downgrade">
                </iframe>
            </div>
        </div>
    </div>

    <footer class="footer">
        <div class="social-links">
            <a href="#" class="social-btn" aria-label="LinkedIn"><i class="fab fa-linkedin-in"></i></a>
            <a href="#" class="social-btn" aria-label="GitHub"><i class="fab fa-github"></i></a>
            <a href="#" class="social-btn" aria-label="Dribbble"><i class="fab fa-dribbble"></i></a>
            <a href="mailto:codewithkanu@gmail.com" class="social-btn" aria-label="Email"><i class="fas fa-envelope"></i></a>
        </div>
        <p>&copy; 2026 Karan Kalyan. All rights reserved.</p>
    </footer>

    <script src="../js/contact.js"></script>
    <script src="../js/main.js"></script>
</body>
</html>
